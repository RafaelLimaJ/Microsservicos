server.port=8081
spring.application.name=pedido-service
spring.datasource.url=jdbc:h2:mem:pedidodb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
services.estoque.url=http://localhost:8082/api/estoque
services.pagamento.url=http://localhost:8083/api/pagamentos
services.notificacao.url=http://localhost:8084/api/notificacoes
